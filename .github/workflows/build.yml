name: Build Executables

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published, created, released]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: sindlish-linux
            binary_path: dist/sindlish
          - os: windows-latest
            artifact_name: sindlish-windows
            binary_path: dist/sindlish.exe
          - os: macos-latest
            artifact_name: sindlish-macos
            binary_path: dist/sindlish

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Pillow for icon generation
        run: uv pip install Pillow

      - name: Generate Icons
        run: uv run python tools/generate_icons.py

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ICON="tools/sindlish.ico"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            ICON="tools/sindlish.icns"
          else
            ICON=""
          fi
          
          if [ -n "$ICON" ]; then
            uv run pyinstaller --onefile --name sindlish --icon "$ICON" main.py
          else
            uv run pyinstaller --onefile --name sindlish main.py
          fi
        shell: bash

      - name: Build Windows Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: powershell

      - name: Build macOS .pkg Installer
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p pkg_root/usr/local/bin
          cp dist/sindlish pkg_root/usr/local/bin/
          # Create a branded package (optional: add --resources for background)
          pkgbuild --identifier com.sindlish.cli --version 0.1.0 --install-location / --root pkg_root dist/sindlish-installer-macos.pkg

      - name: Build Linux .deb Package
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb_root/usr/local/bin
          mkdir -p deb_root/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb_root/DEBIAN
          cp dist/sindlish deb_root/usr/local/bin/
          cp tools/sindlish_icon.png deb_root/usr/share/icons/hicolor/512x512/apps/sindlish.png
          echo "Package: sindlish" > deb_root/DEBIAN/control
          echo "Version: 0.1.0" >> deb_root/DEBIAN/control
          echo "Section: utils" >> deb_root/DEBIAN/control
          echo "Priority: optional" >> deb_root/DEBIAN/control
          echo "Architecture: amd64" >> deb_root/DEBIAN/control
          echo "Maintainer: Sindlish Team" >> deb_root/DEBIAN/control
          echo "Icon: /usr/share/icons/hicolor/512x512/apps/sindlish.png" >> deb_root/DEBIAN/control
          echo "Description: Sindlish programming language interpreter" >> deb_root/DEBIAN/control
          dpkg-deb --build deb_root dist/sindlish-installer-linux.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/sindlish*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
